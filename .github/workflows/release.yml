name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "REACT Camp ${{ github.ref_name }}"
          releaseBody: |
            See CHANGELOG.md for what's new in this release.

            The Windows installers are unsigned, so Windows SmartScreen may show an unknown publisher warning until code signing is added.
          releaseDraft: true
          prerelease: false
