name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "REACT Camp ${{ github.ref_name }}"
          releaseBody: |
            See CHANGELOG.md for what's new in this release.

            The Windows installers are unsigned, so Windows SmartScreen may show an unknown publisher warning until code signing is added.
          releaseDraft: false
          prerelease: false
      - name: Assemble classroom release package
        shell: pwsh
        run: |
          $package = "classroom-package"
          New-Item -ItemType Directory -Force -Path $package | Out-Null
          $installer = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if (-not $installer) { throw "The NSIS installer was not produced." }
          Copy-Item $installer.FullName "$package/REACT-Camp-Setup.exe"
          Copy-Item "deployment/Setup-REACT-Camp.cmd" $package
          Copy-Item "deployment/Setup-REACT-Camp.ps1" $package
          Copy-Item "deployment/CLASSROOM-SETUP.txt" $package
          Compress-Archive -Path "$package/*" -DestinationPath "REACT-Camp-${{ github.ref_name }}-Classroom-Setup.zip"
      - name: Attach classroom package to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "REACT-Camp-${{ github.ref_name }}-Classroom-Setup.zip" --clobber
