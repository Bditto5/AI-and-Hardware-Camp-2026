name: Import and build REACT Camp

on:
  push:
    paths:
      - "react-camp-source.zip"

permissions:
  contents: write

jobs:
  import-and-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unpack the desktop source
        shell: pwsh
        run: |
          Expand-Archive -LiteralPath react-camp-source.zip -DestinationPath . -Force
          Remove-Item -LiteralPath react-camp-source.zip
          Remove-Item -LiteralPath .github/workflows/import-build.yml
          Remove-Item -LiteralPath ai-helper.html,curriculum.html,setup.html -ErrorAction SilentlyContinue

      - name: Commit the desktop foundation
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build REACT Camp Windows desktop foundation"
          git push

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify source
        run: |
          npm ci
          npm run lint
          npm run typecheck

      - name: Build Windows installers
        run: npm run tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: react-camp-windows-installer
          path: src-tauri/target/release/bundle/
